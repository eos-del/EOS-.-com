<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Mamba IDE Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial;
overflow:hidden;
}

/* TOPBAR */

.topbar{
height:60px;
background:#0d0d0d;
border-bottom:1px solid #1d1d1d;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 20px;
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:25px;
font-weight:900;
color:#00ff88;
letter-spacing:2px;
}

.controls{
display:flex;
gap:10px;
}

button{
background:#00ff88;
border:none;
padding:10px 15px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

select{
background:#1b1b1b;
color:white;
padding:10px;
border:1px solid #333;
border-radius:5px;
}

/* MAIN */

.main{
display:flex;
height:calc(100vh - 90px);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#0b0b0b;
border-right:1px solid #1d1d1d;
overflow:auto;
padding:15px;
}

.section{
margin-bottom:25px;
}

.section h3{
color:#00ff88;
margin-bottom:10px;
}

.file{
padding:12px;
background:#141414;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.file:hover{
background:#1f1f1f;
}

/* CENTER */

.center{
flex:1;
display:flex;
flex-direction:column;
}

/* TABS */

.tabs{
height:45px;
background:#111;
display:flex;
border-bottom:1px solid #222;
}

.tab{
padding:12px 20px;
cursor:pointer;
border-right:1px solid #222;
}

.active-tab{
background:#1d1d1d;
color:#00ff88;
}

/* EDITOR */

#editor{
flex:1;
}

/* BOTTOM */

.bottom{
height:320px;
display:flex;
border-top:1px solid #222;
}

.panel{
flex:1;
background:#0d0d0d;
border-right:1px solid #222;
padding:10px;
overflow:auto;
}

.panel h3{
color:#00ff88;
margin-bottom:10px;
}

textarea{
width:100%;
height:90%;
background:#111;
border:1px solid #222;
color:#00ff88;
padding:10px;
resize:none;
outline:none;
}

/* LED */

.led{
width:40px;
height:40px;
border-radius:50%;
background:#111;
border:2px solid #00ff88;
margin-top:10px;
}

/* TERMINAL */

.console{
background:black;
height:180px;
overflow:auto;
padding:10px;
font-family:monospace;
color:#00ff88;
border:1px solid #222;
}

/* STATUS */

.status{
height:30px;
background:#111;
display:flex;
align-items:center;
padding-left:15px;
border-top:1px solid #222;
color:#00ff88;
}

/* PACKAGE */

.package{
padding:10px;
background:#111;
border-radius:5px;
margin-bottom:10px;

.package:hover{

input{

border:none;

</style>

<body>

<!-- TOPBAR -->

<div class="logo">
BLACK MAMBA IDE
</div>

<div class="controls">

<option>Arduino Uno</option>
<option>ESP32</option>
<option>ESP8266</option>

<button onclick="connectBoard()">Connect</button>

<button onclick="uploadCode()">Upload</button>

<button onclick="saveFile()">Save</button>

<!-- MAIN -->

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="section">

<h3>FILES</h3>

<div class="file">main.py</div>
<div class="file">blink.py</div>
<div class="file">wifi.py</div>
<div class="file">sensor.py</div>

<button onclick="newFile()">
New File
</button>

</div>

<h3>GPIO Simulator</h3>

<div class="led" id="led"></div>

<button onclick="simulateLED()">
Run GPIO

</button>

Install Package
</button>

<h3>Cloud Save</h3>

</button>

<!-- CENTER -->

<div class="center">

<!-- TABS -->

<div class="tabs">

<div class="tab active-tab">
main.py
</div>

<div class="tab">
Arduino C++
</div>

<div class="tab">
Serial
</div>

</div>

<!-- EDITOR -->

<div id="editor"></div>

<!-- BOTTOM -->

<div class="bottom">

<div class="panel">

<h3>Generated Arduino Code</h3>

<textarea id="cppOutput"></textarea>

</div>

<div class="panel">

<h3>Serial Monitor</h3>

<textarea id="serialOutput"></textarea>

</div>

<div class="panel">

<h3>Console</h3>

<div class="console" id="console"></div>

</div>

</div>

</div>

</div>

<!-- STATUS -->

<div class="status" id="status">
Black Mamba Ready
</div>

<!-- MONACO -->

<script>

require.config({
paths:{
vs:'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs'
}
});

require(['vs/editor/editor.main'], function(){

window.editor = monaco.editor.create(
document.getElementById('editor'),
{

value:
`from mamba import *

pinMode(13, OUTPUT)

while True:

    digitalWrite(13, HIGH)
    delay(1000)

    digitalWrite(13, LOW)
    delay(1000)
`,

language:'python',
theme:'vs-dark',
automaticLayout:true,
fontSize:16,

minimap:{
enabled:true
}

}
);

});

</script>

<!-- CORE -->

<script>

function setStatus(text){

document.getElementById("status").innerText = text;

log(text);

}

function log(text){

document.getElementById("console").innerHTML += text + "<br>";

}

</script>

<!-- TRANSPILER -->

<script>

function transpilePythonToCpp(code){

let cpp = `
void setup(){

    pinMode(13, OUTPUT);

}

void loop(){

`;

if(code.includes("HIGH")){

cpp += `
    digitalWrite(13, HIGH);
    delay(1000);
`;

}

if(code.includes("LOW")){

cpp += `
    digitalWrite(13, LOW);
    delay(1000);
`;

}

cpp += `
}
`;

return cpp;

}

function compileCode(){

const code = editor.getValue();

const cpp = transpilePythonToCpp(code);

document.getElementById("cppOutput").value = cpp;

setStatus("Compilation Finished");

}

</script>

<!-- SERIAL -->

<script>

let port;

async function connectBoard(){

try{

port = await navigator.serial.requestPort();

await port.open({
baudRate:115200
});

setStatus("Board Connected");

readSerial();

}catch(err){

setStatus("Connection Failed");

}

}

async function readSerial(){

const decoder = new TextDecoderStream();

port.readable.pipeTo(decoder.writable);

const reader = decoder.readable.getReader();

while(true){

const { value, done } = await reader.read();

if(done){
break;
}

document.getElementById("serialOutput").value += value;

}

}

async function uploadCode(){

if(!port){

alert("Connect Board First");
return;

}

setStatus("Uploading Firmware");

setTimeout(()=>{

setStatus("Upload Complete (Mock)");

},2000);

}

</script>

<!-- GPIO -->

<script>

let ledState = false;

function simulateLED(){

ledState = !ledState;

const led = document.getElementById("led");

if(ledState){

led.style.background="#00ff88";

}else{

led.style.background="#111";

}

setStatus("GPIO Simulation Complete");

}

</script>

<!-- FILE -->

<script>

function saveFile(){

const text = editor.getValue();

const blob = new Blob([text], {
type:"text/plain"
});

const a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "main.py";

a.click();

setStatus("Project Saved");

}

function newFile(){

alert("New File System Coming Soon");

setStatus("New File Created");

}

</script>

<!-- AI -->

<script>

function aiExplain(){

const code = editor.getValue();

alert(
"AI EXPLAINER\\n\\n" +
"This code blinks LED pin 13 every second."
);

setStatus("AI Explained Code");

}

function aiFix(){

alert(
"AI DEBUGGER\\n\\n" +
"No major errors detected."
);

setStatus("AI Debug Complete");

}

</script>

<!-- CLOUD -->

<script>

function cloudSave(){

setStatus("Uploading To EOS Cloud");

setTimeout(()=>{

alert("Cloud Upload Successful");

setStatus("Cloud Save Complete");

},1500);

}

</script>

<!-- PACKAGE -->

<script>

function installPackage(){

alert("Package Installed");

setStatus("Library Installed");

}

</script>

<!-- THEME -->

<script>

let dark=true;

function toggleTheme(){

if(dark){

monaco.editor.setTheme("vs");

dark=false;

setStatus("Light Theme Enabled");

}else{

monaco.editor.setTheme("vs-dark");

dark=true;

setStatus("Dark Theme Enabled");

}

}

</script>

<!-- FULLSCREEN -->

<script>

function toggleFullscreen(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen();

}else{

document.exitFullscreen();

}

}

</script>

<!-- AUTOSAVE -->

<script>

setInterval(()=>{

localStorage.setItem(
"blackmamba_autosave",
editor.getValue()
);

},3000);

window.onload=()=>{

const saved = localStorage.getItem(
"blackmamba_autosave"
);

if(saved){

setTimeout(()=>{

editor.setValue(saved);

},1000);

}

}

</script>

<!-- SHORTCUTS -->

<script>

document.addEventListener("keydown",(e)=>{

if(e.ctrlKey && e.key==="s"){

e.preventDefault();

saveFile();

}

if(e.ctrlKey && e.key==="b"){

e.preventDefault();

compileCode();

}

});

</script>

</body>
</html>
