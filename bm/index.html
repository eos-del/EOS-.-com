<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Black Mamba IDE Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
color:white;
font-family:Arial;
overflow:hidden;
}

/* TOPBAR */

.topbar{
height:60px;
background:#0f0f0f;
border-bottom:1px solid #1b1b1b;

display:flex;
align-items:center;
justify-content:space-between;

padding:0 20px;
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:24px;
color:#00ff88;
letter-spacing:2px;
font-weight:800;
}

.controls{
display:flex;
gap:10px;
align-items:center;
}

button{
background:#00ff88;
border:none;
padding:10px 15px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.04);
}

select{
background:#1b1b1b;
color:white;
border:1px solid #333;
padding:10px;
border-radius:5px;
}

/* MAIN */

.main{
display:flex;
height:calc(100vh - 88px);
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#0c0c0c;
border-right:1px solid #1b1b1b;
padding:15px;
overflow:auto;
}

.sidebar h2{
color:#00ff88;
margin-bottom:15px;
}

.file{
padding:12px;
background:#141414;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.file:hover{
background:#1f1f1f;
}

/* EDITOR */

.editor-area{
flex:1;
display:flex;
flex-direction:column;
}

/* TABS */

.tabs{
height:45px;
background:#111;
display:flex;
border-bottom:1px solid #222;
}

.tab{
padding:12px 20px;
cursor:pointer;
border-right:1px solid #222;
}

.active-tab{
background:#1b1b1b;
color:#00ff88;
}

/* EDITOR */

#editor{
width:100%;
height:100%;
}

/* BOTTOM */

.bottom{
height:280px;
display:flex;
border-top:1px solid #222;
}

.panel{
flex:1;
background:#0d0d0d;
padding:10px;
border-right:1px solid #1b1b1b;
}

.panel h3{
margin-bottom:10px;
color:#00ff88;
}

textarea{
width:100%;
height:90%;
background:#111;
color:#00ff88;
border:1px solid #222;
padding:10px;
resize:none;
outline:none;
}

/* STATUS BAR */

.statusbar{
height:28px;
background:#0f0f0f;
border-top:1px solid #1b1b1b;

display:flex;
align-items:center;

padding-left:20px;

color:#00ff88;
font-size:14px;
}

/* AI DEBUG */

.ai-box{
margin-top:20px;
padding:15px;
background:#111;
border-radius:6px;
border:1px solid #222;
}

.ai-box button{
margin-top:10px;
width:100%;
}

/* SIMULATOR */

.simulator{
margin-top:20px;
padding:15px;
background:#111;
border-radius:6px;
border:1px solid #222;
}

.led{
width:40px;
height:40px;
border-radius:50%;
background:#111;
border:2px solid #00ff88;
margin-top:10px;
}

/* WIFI PANEL */

.wifi{
margin-top:20px;
padding:15px;
background:#111;
border-radius:6px;
border:1px solid #222;
}

input{
width:100%;
padding:10px;
margin-top:10px;
background:#1a1a1a;
border:none;
color:white;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="logo">
BLACK MAMBA IDE
</div>

<div class="controls">

<select id="board">

<option>Arduino Uno</option>
<option>ESP32</option>
<option>ESP8266</option>

</select>

<button onclick="connectBoard()">
Connect
</button>

<button onclick="compileCode()">
Compile
</button>

<button onclick="uploadCode()">
Upload
</button>

<button onclick="saveFile()">
Save
</button>

<button onclick="toggleTheme()">
Theme
</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>PROJECT</h2>

<div class="file">main.py</div>
<div class="file">blink.py</div>
<div class="file">wifi.py</div>

<!-- AI DEBUG -->

<div class="ai-box">

<h3>AI Debugger</h3>

<p>
Find beginner mistakes in your hardware code.
</p>

<button onclick="runAIDebugger()">
Run AI Debugger
</button>

</div>

<!-- CIRCUIT SIMULATOR -->

<div class="simulator">

<h3>GPIO Simulator</h3>

<p>
LED Pin 13
</p>

<div class="led" id="led"></div>

<button onclick="simulateLED()">
Run Simulation
</button>

</div>

<!-- WIFI -->

<div class="wifi">

<h3>WiFi OTA</h3>

<input placeholder="WiFi Name">
<input placeholder="WiFi Password">

<button onclick="wifiUpload()">
OTA Upload
</button>

</div>

</div>

<!-- EDITOR -->

<div class="editor-area">

<!-- TABS -->

<div class="tabs">

<div class="tab active-tab">
Python
</div>

<div class="tab">
Arduino
</div>

<div class="tab">
ESP32
</div>

</div>

<!-- EDITOR -->

<div id="editor"></div>

<!-- BOTTOM -->

<div class="bottom">

<div class="panel">

<h3>Serial Monitor</h3>

<textarea id="serialOutput"></textarea>

</div>

<div class="panel">

<h3>Generated Arduino C++</h3>

<textarea id="cppOutput"></textarea>

</div>

</div>

</div>

</div>

<!-- STATUS -->

<div class="statusbar" id="statusbar">
Black Mamba Ready
</div>

<!-- MONACO -->

<script>

require.config({
paths:{
vs:'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs'
}
});

require(['vs/editor/editor.main'], function(){

window.editor = monaco.editor.create(
document.getElementById('editor'),
{

value:
`from mamba import *

pinMode(13, OUTPUT)

while True:

    digitalWrite(13, HIGH)
    delay(1000)

    digitalWrite(13, LOW)
    delay(1000)
`,

language:'python',
theme:'vs-dark',
automaticLayout:true,
fontSize:16,
minimap:{
enabled:true
}

}
);

});

</script>

<!-- TRANSPILER -->

<script>

function transpilePythonToCpp(code){

let cpp = `
void setup(){

    pinMode(13, OUTPUT);

}

void loop(){

`;

if(code.includes("digitalWrite(13, HIGH)")){

cpp += `
    digitalWrite(13, HIGH);
    delay(1000);
`;

}

if(code.includes("digitalWrite(13, LOW)")){

cpp += `
    digitalWrite(13, LOW);
    delay(1000);
`;

}

cpp += `
}
`;

return cpp;

}

function compileCode(){

const code = editor.getValue();

const cpp = transpilePythonToCpp(code);

document.getElementById("cppOutput").value = cpp;

setStatus("Python transpiled to Arduino C++");

}

</script>

<!-- SERIAL -->

<script>

let port;

async function connectBoard(){

try{

port = await navigator.serial.requestPort();

await port.open({
baudRate:115200
});

setStatus("Board Connected");

readSerial();

}catch(error){

console.error(error);

setStatus("Connection Failed");

}

}

async function readSerial(){

const decoder = new TextDecoderStream();

port.readable.pipeTo(decoder.writable);

const reader = decoder.readable.getReader();

while(true){

const { value, done } = await reader.read();

if(done){
break;
}

document.getElementById("serialOutput").value += value;

}

}

async function uploadCode(){

if(!port){

alert("Connect your board first");
return;

}

setStatus("Preparing Upload");

setTimeout(() => {

setStatus("Firmware Upload Coming Soon");

},1500);

}

</script>

<!-- SAVE FILE -->

<script>

function saveFile(){

const text = editor.getValue();

const blob = new Blob([text], {
type:"text/plain"
});

const a = document.createElement("a");

a.href = URL.createObjectURL(blob);

a.download = "main.py";

a.click();

setStatus("File Saved");

}

</script>

<!-- THEME -->

<script>

let dark = true;

function toggleTheme(){

if(dark){

monaco.editor.setTheme("vs");

dark = false;

setStatus("Light Theme Enabled");

}else{

monaco.editor.setTheme("vs-dark");

dark = true;

setStatus("Dark Theme Enabled");

}

}

</script>

<!-- AI DEBUG -->

<script>

function runAIDebugger(){

const code = editor.getValue();

let problems = [];

if(!code.includes("pinMode")){
problems.push("Missing pinMode()");
}

if(!code.includes("delay")){
problems.push("Missing delay()");
}

if(problems.length === 0){

alert("AI Debugger: No major beginner mistakes found");

}else{

alert("AI Debugger:\\n\\n" + problems.join("\\n"));

}

setStatus("AI Debugger Finished");

}

</script>

<!-- GPIO SIMULATOR -->

<script>

let ledOn = false;

function simulateLED(){

const led = document.getElementById("led");

ledOn = !ledOn;

if(ledOn){

led.style.background = "#00ff88";

}else{

led.style.background = "#111";

}

setStatus("GPIO Simulation Executed");

}

</script>

<!-- WIFI OTA -->

<script>

function wifiUpload(){

setStatus("OTA Upload Preparing");

setTimeout(() => {

alert("OTA Upload System Coming in Backend Version");

setStatus("OTA Upload Placeholder Ready");

},1500);

}

</script>

<!-- STATUS -->

<script>

function setStatus(message){

document.getElementById("statusbar").innerText = message;

}

</script>

</body>
</html>
